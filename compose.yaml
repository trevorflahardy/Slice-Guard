services:
  postgres:
    image: postgres
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slice}
      POSTGRES_DB: ${POSTGRES_DB:-slice_guard}
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - "5432:5432"
    restart: always

  backend:
    image: slice_guard_backend
    build:
      context: ./slice-guard
      dockerfile: backend/Dockerfile
      target: release
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slice}
      POSTGRES_DB: ${POSTGRES_DB:-slice_guard}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "3000:3000"

  frontend:
    image: slice_guard_frontend
    build:
      context: ./slice-guard
      dockerfile: frontend/Dockerfile
      target: release
      args:
        VITE_API_URL: http://backend:3000/api
        VITE_WS_URL: ws://backend:3000/ws
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "5173:5173"

  backend-dev:
    profiles: ["dev"]
    build:
      context: ./slice-guard
      dockerfile: backend/Dockerfile
      target: dev
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-slice}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slice}
      POSTGRES_DB: ${POSTGRES_DB:-slice_guard}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./slice-guard/backend:/usr/src/app/backend
      - ./slice-guard/shared:/usr/src/app/shared
    depends_on:
      - postgres
    ports:
      - "3000:3000"

  frontend-dev:
    profiles: ["dev"]
    build:
      context: ./slice-guard
      dockerfile: frontend/Dockerfile
      target: dev
      args:
        VITE_API_URL: http://backend-dev:3000/api
        VITE_WS_URL: ws://backend-dev:3000/ws
    volumes:
      - ./slice-guard/frontend:/usr/src/app
      - ./slice-guard/shared:/usr/src/app/shared
    depends_on:
      - backend-dev
    ports:
      - "5173:5173"

volumes:
  postgres:
