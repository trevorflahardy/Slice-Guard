services:
    postgres:
        image: postgres:17
        container_name: postgres
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-slice}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slice}
            POSTGRES_DB: ${POSTGRES_DB:-slice_guard}
            PGDATA: /data/postgres
        volumes:
            - postgres:/data/postgres
        ports:
            - '5432:5432'
        restart: always

    minio:
        image: minio/minio
        container_name: minio
        environment:
            MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
            MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio123}
        volumes:
            - minio-data:/data
        command: server /data --console-address ":9001"
        ports:
            - '9000:9000'
            - '9001:9001'

    backend:
        image: slice_guard_backend
        build:
            context: ./slice-guard
            dockerfile: backend/Dockerfile
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-slice}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-slice}
            POSTGRES_DB: ${POSTGRES_DB:-slice_guard}
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            S3_ENDPOINT: http://minio:9000
            S3_PUBLIC_ENDPOINT: http://localhost:9000
            S3_BUCKET: slice-guard
            S3_REGION: us-east-1
            S3_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
            S3_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
        depends_on:
            - postgres
            - minio
        restart: unless-stopped
        ports:
            - '3000:3000'
        develop:
            watch:
                - action: sync+restart
                  path: ./slice-guard/backend
                  target: /usr/src/app/backend
                  ignore:
                      - node_modules/
                - action: rebuild
                  path: ./slice-guard/backend/package.json

volumes:
    postgres:
    minio-data:
